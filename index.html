<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Minha IA — Groq</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --border: #E2E5EA;
    --primary: #2563EB;
    --primary-dark: #1D4ED8;
    --text: #111827;
    --muted: #6B7280;
    --user-bubble: #2563EB;
    --ai-bubble: #F1F5F9;
    --ai-text: #1E293B;
    --danger: #DC2626;
    --radius: 12px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    width: 34px; height: 34px;
    background: var(--primary);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo svg { width: 20px; height: 20px; fill: #fff; }

  .header-title { font-size: 15px; font-weight: 600; }
  .header-sub   { font-size: 12px; color: var(--muted); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #9CA3AF;
    flex-shrink: 0;
    transition: background .3s;
  }
  .status-dot.ready  { background: #22C55E; }
  .status-dot.typing { background: #F59E0B; }

  /* ── CONFIG BAR ── */
  #config-bar {
    background: #EFF6FF;
    border-bottom: 1px solid #BFDBFE;
    padding: 10px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
  }

  #config-bar label { font-size: 12px; color: #1D4ED8; font-weight: 500; white-space: nowrap; }

  #api-key-input {
    flex: 1; min-width: 180px;
    border: 1px solid #93C5FD;
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 13px;
    background: #fff;
    color: var(--text);
    outline: none;
  }
  #api-key-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }

  #model-select {
    border: 1px solid #93C5FD;
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 13px;
    background: #fff;
    color: var(--text);
    outline: none;
    cursor: pointer;
  }

  #sys-toggle {
    font-size: 12px;
    color: var(--primary);
    cursor: pointer;
    text-decoration: underline;
    background: none; border: none;
    white-space: nowrap;
  }

  /* ── SYSTEM PROMPT ── */
  #sys-panel {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: none;
    flex-shrink: 0;
  }
  #sys-panel.open { display: block; }
  #sys-prompt {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    resize: vertical;
    min-height: 70px;
    color: var(--text);
    outline: none;
  }
  #sys-prompt:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }

  /* ── MESSAGES ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 780px;
    width: 100%;
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai   { align-self: flex-start; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }
  .msg.user .avatar { background: var(--primary); color: #fff; }
  .msg.ai   .avatar { background: #E2E8F0; color: #475569; }

  .bubble {
    padding: 11px 15px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    max-width: calc(100% - 44px);
    white-space: pre-wrap;
    word-break: break-word;
    box-shadow: var(--shadow);
  }
  .msg.user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.ai .bubble {
    background: var(--ai-bubble);
    color: var(--ai-text);
    border-bottom-left-radius: 4px;
  }

  .typing-dots span {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #94A3B8;
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* empty state */
  #empty-state {
    margin: auto;
    text-align: center;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  #empty-state .big-icon { font-size: 40px; }
  #empty-state p { font-size: 14px; max-width: 280px; line-height: 1.5; }

  /* ── INPUT AREA ── */
  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    resize: none;
    min-height: 44px;
    max-height: 140px;
    overflow-y: auto;
    outline: none;
    line-height: 1.5;
    color: var(--text);
    transition: border-color .2s;
  }
  #user-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }

  #send-btn {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    width: 44px; height: 44px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, transform .1s;
  }
  #send-btn:hover:not(:disabled)  { background: var(--primary-dark); }
  #send-btn:active:not(:disabled) { transform: scale(.95); }
  #send-btn:disabled { background: #CBD5E1; cursor: not-allowed; }
  #send-btn svg { width: 18px; height: 18px; fill: #fff; }

  #clear-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 44px; height: 44px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: border-color .2s, color .2s;
  }
  #clear-btn:hover { border-color: var(--danger); color: var(--danger); }
  #clear-btn svg { width: 16px; height: 16px; }

  /* error toast */
  #toast {
    position: fixed;
    bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #FEF2F2;
    border: 1px solid #FECACA;
    color: var(--danger);
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s, transform .3s;
    max-width: 90vw;
    text-align: center;
    z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 500px) {
    #messages { padding: 16px 12px; }
    #input-area { padding: 10px 12px; }
    #config-bar { padding: 8px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <div>
      <div class="header-title">Minha IA</div>
      <div class="header-sub">Powered by Groq</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:6px;">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-label" style="font-size:12px;color:var(--muted)">Aguardando chave</span>
  </div>
</header>

<div id="config-bar">
  <label>🔑 API Key Groq:</label>
  <input type="password" id="api-key-input" placeholder="gsk_..." autocomplete="off"/>
  <select id="model-select">
    <option value="llama3-8b-8192">LLaMA 3 · 8B (rápido)</option>
    <option value="llama3-70b-8192">LLaMA 3 · 70B (inteligente)</option>
    <option value="mixtral-8x7b-32768">Mixtral · 8x7B (contexto longo)</option>
    <option value="gemma2-9b-it">Gemma 2 · 9B</option>
  </select>
  <button id="sys-toggle">⚙ Personalidade</button>
</div>

<div id="sys-panel">
  <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px;">Prompt de sistema (define o comportamento da IA)</label>
  <textarea id="sys-prompt" placeholder="Ex: Você é um assistente de segurança patrimonial. Responda sempre em português e de forma objetiva...">Você é um assistente inteligente e prestativo. Responda sempre em português do Brasil, de forma clara e objetiva.</textarea>
</div>

<div id="messages">
  <div id="empty-state">
    <div class="big-icon">💬</div>
    <p>Cole sua API Key Groq acima e comece a conversar com sua IA.</p>
    <p style="font-size:12px">Obtenha sua chave grátis em <strong>console.groq.com</strong></p>
  </div>
</div>

<div id="input-area">
  <button id="clear-btn" title="Limpar conversa">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
  </button>
  <textarea id="user-input" rows="1" placeholder="Digite sua mensagem…"></textarea>
  <button id="send-btn" disabled>
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<div id="toast"></div>

<script>
  const apiKeyInput  = document.getElementById('api-key-input');
  const modelSelect  = document.getElementById('model-select');
  const sysToggle    = document.getElementById('sys-toggle');
  const sysPanel     = document.getElementById('sys-panel');
  const sysPrompt    = document.getElementById('sys-prompt');
  const messagesEl   = document.getElementById('messages');
  const emptyState   = document.getElementById('empty-state');
  const userInput    = document.getElementById('user-input');
  const sendBtn      = document.getElementById('send-btn');
  const clearBtn     = document.getElementById('clear-btn');
  const statusDot    = document.getElementById('status-dot');
  const statusLabel  = document.getElementById('status-label');
  const toast        = document.getElementById('toast');

  let history = [];       // {role, content}[]
  let isLoading = false;

  // ── Auto-resize textarea ──
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
    updateSendBtn();
  });

  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── API key watcher ──
  apiKeyInput.addEventListener('input', updateStatus);

  function updateStatus() {
    const key = apiKeyInput.value.trim();
    if (key.startsWith('gsk_') && key.length > 20) {
      statusDot.className = 'status-dot ready';
      statusLabel.textContent = 'Pronto';
    } else if (key.length > 0) {
      statusDot.className = 'status-dot';
      statusLabel.textContent = 'Chave inválida';
    } else {
      statusDot.className = 'status-dot';
      statusLabel.textContent = 'Aguardando chave';
    }
    updateSendBtn();
  }

  function updateSendBtn() {
    const key = apiKeyInput.value.trim();
    const msg = userInput.value.trim();
    sendBtn.disabled = isLoading || !key.startsWith('gsk_') || msg.length === 0;
  }

  // ── Toggle system panel ──
  sysToggle.addEventListener('click', () => {
    sysPanel.classList.toggle('open');
    sysToggle.textContent = sysPanel.classList.contains('open') ? '✕ Fechar' : '⚙ Personalidade';
  });

  // ── Clear chat ──
  clearBtn.addEventListener('click', () => {
    history = [];
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = 'flex';
  });

  sendBtn.addEventListener('click', sendMessage);

  // ── Create message bubble ──
  function appendMessage(role, text) {
    emptyState.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'Eu' : 'IA';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function appendTyping() {
    emptyState.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'msg ai';
    msg.id = 'typing-msg';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'IA';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-msg');
    if (t) t.remove();
  }

  // ── Toast ──
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 4000);
  }

  // ── Send message ──
  async function sendMessage() {
    const text = userInput.value.trim();
    const apiKey = apiKeyInput.value.trim();
    const model  = modelSelect.value;
    const system = sysPrompt.value.trim();

    if (!text || !apiKey || isLoading) return;

    // Add to history and UI
    history.push({ role: 'user', content: text });
    appendMessage('user', text);
    userInput.value = '';
    userInput.style.height = 'auto';

    // State: loading
    isLoading = true;
    updateSendBtn();
    appendTyping();
    statusDot.className = 'status-dot typing';
    statusLabel.textContent = 'Gerando…';

    // Build messages array
    const messages = [...history];

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model,
          messages,
          ...(system ? { system } : {}),
          temperature: 0.7,
          max_tokens: 1024,
          stream: false
        })
      });

      const data = await res.json();

      if (!res.ok) {
        const errMsg = data?.error?.message || `Erro ${res.status}`;
        throw new Error(errMsg);
      }

      const reply = data.choices?.[0]?.message?.content || '(sem resposta)';
      history.push({ role: 'assistant', content: reply });

      removeTyping();
      appendMessage('ai', reply);

      statusDot.className = 'status-dot ready';
      statusLabel.textContent = 'Pronto';

    } catch (err) {
      removeTyping();
      const errText = err.message.includes('401')
        ? 'API Key inválida ou sem permissão.'
        : err.message.includes('429')
        ? 'Limite de requisições atingido. Aguarde um momento.'
        : `Erro: ${err.message}`;
      showToast(errText);
      // Remove last user message from history on error
      history.pop();
      statusDot.className = 'status-dot';
      statusLabel.textContent = 'Erro';
    } finally {
      isLoading = false;
      updateSendBtn();
    }
  }

  // ── Note: system prompt via Groq API uses messages array ──
  // We inject system as first message if provided
  const originalSend = sendMessage;

  // Override to inject system prompt properly
  async function sendMessageWithSystem() {
    const text = userInput.value.trim();
    const apiKey = apiKeyInput.value.trim();
    const model  = modelSelect.value;
    const system = sysPrompt.value.trim();

    if (!text || !apiKey || isLoading) return;

    history.push({ role: 'user', content: text });
    appendMessage('user', text);
    userInput.value = '';
    userInput.style.height = 'auto';

    isLoading = true;
    updateSendBtn();
    appendTyping();
    statusDot.className = 'status-dot typing';
    statusLabel.textContent = 'Gerando…';

    // Build payload messages — system as first message
    const payload = [];
    if (system) payload.push({ role: 'system', content: system });
    payload.push(...history);

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model,
          messages: payload,
          temperature: 0.7,
          max_tokens: 1024
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || `Erro ${res.status}`);

      const reply = data.choices?.[0]?.message?.content || '(sem resposta)';
      history.push({ role: 'assistant', content: reply });

      removeTyping();
      appendMessage('ai', reply);

      statusDot.className = 'status-dot ready';
      statusLabel.textContent = 'Pronto';

    } catch (err) {
      removeTyping();
      const errText = err.message.includes('401')
        ? 'API Key inválida ou sem permissão.'
        : err.message.includes('429')
        ? 'Limite de requisições atingido. Aguarde um momento.'
        : `Erro: ${err.message}`;
      showToast(errText);
      history.pop();
      statusDot.className = 'status-dot';
      statusLabel.textContent = 'Erro';
    } finally {
      isLoading = false;
      updateSendBtn();
    }
  }

  // Replace send button listener with correct version
  sendBtn.removeEventListener('click', sendMessage);
  sendBtn.addEventListener('click', sendMessageWithSystem);
  userInput.removeEventListener('keydown', () => {});
  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessageWithSystem(); }
  });
</script>
</body>
</html>
